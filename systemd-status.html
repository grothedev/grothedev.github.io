<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systemd Services Status</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .header .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
            font-weight: 400;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .services-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .service-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .service-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .service-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .service-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d3748;
            font-family: 'Monaco', 'Consolas', monospace;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            position: relative;
        }

        .status-indicator.active {
            background-color: #48bb78;
            box-shadow: 0 0 0 3px rgba(72, 187, 120, 0.3);
        }

        .status-indicator.inactive {
            background-color: #f56565;
            box-shadow: 0 0 0 3px rgba(245, 101, 101, 0.3);
        }

        .status-indicator.failed {
            background-color: #e53e3e;
            box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.3);
        }

        .status-indicator.loading {
            background-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .service-details {
            font-size: 0.9rem;
            color: #4a5568;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .detail-label {
            font-weight: 500;
            color: #718096;
        }

        .detail-value {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.85rem;
        }

        .service-description {
            color: #718096;
            font-size: 0.85rem;
            margin-top: 10px;
            font-style: italic;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }

        .loading-message {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
            margin: 40px 0;
        }

        .error-message {
            background: rgba(245, 101, 101, 0.1);
            border: 1px solid rgba(245, 101, 101, 0.3);
            color: #f56565;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            body {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>Systemd Services</h1>
            <div class="subtitle">System Process Status Monitor</div>
        </div>

        <div class="controls">
            <button class="refresh-btn" onclick="refreshServices()">Refresh Status</button>
            <button class="refresh-btn" onclick="toggleAutoRefresh()">Auto Refresh: <span id="auto-status">Off</span></button>
        </div>

        <div id="loading" class="loading-message">Loading systemd services...</div>
        <div id="error" class="error-message" style="display: none;"></div>
        <div id="services-container" class="services-grid"></div>

        <div class="footer">
            Last updated: <span id="last-updated">--</span>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;
        let isAutoRefresh = false;

        function formatUptime(seconds) {
            if (!seconds) return '--';
            
            const days = Math.floor(seconds / (24 * 3600));
            const hours = Math.floor((seconds % (24 * 3600)) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            
            if (days > 0) return `${days}d ${hours}h ${minutes}m`;
            if (hours > 0) return `${hours}h ${minutes}m`;
            return `${minutes}m`;
        }

        function getStatusClass(status) {
            if (status === 'active') return 'active';
            if (status === 'inactive') return 'inactive';
            if (status === 'failed') return 'failed';
            return 'loading';
        }

        function createServiceCard(service) {
            return `
                <div class="service-card">
                    <div class="service-header">
                        <div class="service-name">${service.name}</div>
                        <div class="status-indicator ${getStatusClass(service.status)}"></div>
                    </div>
                    <div class="service-details">
                        <div class="detail-row">
                            <span class="detail-label">Status:</span>
                            <span class="detail-value">${service.status}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Load State:</span>
                            <span class="detail-value">${service.loadState || '--'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Active Since:</span>
                            <span class="detail-value">${service.activeSince || '--'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Memory Usage:</span>
                            <span class="detail-value">${service.memory || '--'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">PID:</span>
                            <span class="detail-value">${service.pid || '--'}</span>
                        </div>
                    </div>
                    ${service.description ? `<div class="service-description">${service.description}</div>` : ''}
                </div>
            `;
        }

        async function fetchServices() {
            try {
                const response = await fetch('/api/systemd-status');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const services = await response.json();
                return services;
            } catch (error) {
                console.error('Failed to fetch services:', error);
                throw error;
            }
        }

        async function updateServicesList() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const containerEl = document.getElementById('services-container');

            try {
                loadingEl.style.display = 'block';
                errorEl.style.display = 'none';
                
                const services = await fetchServices();
                
                containerEl.innerHTML = services.map(createServiceCard).join('');
                loadingEl.style.display = 'none';
                
                document.getElementById('last-updated').textContent = new Date().toLocaleString();
                
            } catch (error) {
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.textContent = `Failed to load services: ${error.message}`;
            }
        }

        function refreshServices() {
            updateServicesList();
        }

        function toggleAutoRefresh() {
            isAutoRefresh = !isAutoRefresh;
            const statusEl = document.getElementById('auto-status');
            
            if (isAutoRefresh) {
                statusEl.textContent = 'On';
                autoRefreshInterval = setInterval(updateServicesList, 30000); // Refresh every 30 seconds
            } else {
                statusEl.textContent = 'Off';
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                }
            }
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            updateServicesList();
        });
    </script>
</body>
</html>
